# ========================
# Contractly — Application Config
# ========================

spring.application.name=contractly

# ── Server ──
server.port=8082
server.servlet.context-path=/api

# ── PostgreSQL (JDBC) ──
spring.datasource.url=jdbc:postgresql://localhost:5432/contractly
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP — Spring Boot default)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ── Schema Initialization ──
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/migration/V1__init_schema.sql

# ── Redis ──
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── Mail (SMTP) ──
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:contractly@example.com}
spring.mail.password=${MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── JWT ──
app.jwt.secret=${JWT_SECRET:contractly-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# ── S3 / MinIO ──
app.storage.endpoint=${S3_ENDPOINT:http://localhost:9000}
app.storage.access-key=${S3_ACCESS_KEY:minioadmin}
app.storage.secret-key=${S3_SECRET_KEY:minioadmin}
app.storage.bucket-name=${S3_BUCKET:contractly-docs}
app.storage.region=${S3_REGION:us-east-1}

# ── App ──
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.sign-link-base-url=${SIGN_LINK_BASE_URL:http://localhost:3000/sign}

# ── Logging ──
logging.level.com.contractly=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG
