name: contractly
services:
  contractly:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contractly
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - MONGO_URI=mongodb://mongo:27017/contractly
      - JWT_SECRET=contractly-super-secret-key-that-is-at-least-256-bits-long-for-hs256
    depends_on:
      - mongo
    networks:
      - contractly-net

  mongo:
    image: mongo:6.0
    container_name: contractly-mongo
    ports:
      - "27017:27017"
    volumes:
      - contractly_mongo_data:/data/db
    networks:
      - contractly-net

networks:
  contractly-net:
    driver: bridge

volumes:
  contractly_mongo_data:
