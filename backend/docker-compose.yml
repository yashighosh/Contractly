version: '3.8'

services:
  contractly:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contractly-backend
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/contractly?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SERVER_PORT=8082
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - contractly-net

  mysql:
    image: mysql:8.0
    container_name: contractly-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: contractly
    ports:
      - "3307:3306"
    volumes:
      - contractly_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contractly-net

  redis:
    image: redis:7-alpine
    container_name: contractly-redis
    ports:
      - "6381:6379"
    volumes:
      - contractly_redis_data:/data
    networks:
      - contractly-net

networks:
  contractly-net:
    driver: bridge

volumes:
  contractly_mysql_data:
  contractly_redis_data:
